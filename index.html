<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PUBG Mortar Distance Tool</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
PUBG Mortar Distance Tool
</header>

<div class="container">

<div class="toolbar">

<label class="button">
<input type="file" id="upload" accept="image/*">
📷 Chọn ảnh PUBG
</label>

<button id="resetBtn">Reset</button>

<button id="calibrateBtn">Calibrate</button>

<button id="zoomIn">+</button>

<button id="zoomOut">−</button>

</div>

<div class="canvasBox">

<canvas id="canvas" width="1400" height="900"></canvas>

</div>

<div class="info">

<div class="card">
Distance
<div class="value" id="distance">0 m</div>
</div>

<div class="card">
Bearing
<div class="value" id="bearing">0°</div>
</div>

<div class="card">
Error
<div class="value" id="error">±0 m</div>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
